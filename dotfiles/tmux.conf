# Colors and terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar position
set -g status-position bottom
set -g status-interval 5

# Status bar colors
set -g status-style "bg=#0a0a0a,fg=#808080"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#7c8f8f,fg=#000000,bold] #S #[bg=#0a0a0a] "

# Right: pane info, date, time
set -g status-right-length 60
set -g status-right "#[fg=#808080]Pane #(expr #{pane_index} + 1)/#{window_panes} #[fg=#808080]| #[fg=#808080]#(TZ='America/New_York' date +'%%b %%d') #[bg=#7c8f8f,fg=#000000,bold] #(TZ='America/New_York' date +'%%I:%%M %%p') "

# Window list styling
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#1e1e1e,fg=#d4d4d4,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#7c8f8f"

# Message styling
set -g message-style "bg=#1e1e1e,fg=#d4d4d4"
