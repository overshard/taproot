# Colors and terminal
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g mouse on

# Status bar position
set -g status-position bottom
set -g status-interval 5

# Status bar colors — warm dark bg, muted text
set -g status-style "bg=#0e0d0a,fg=#665f56"

# Left: session name — green accent tag
set -g status-left-length 30
set -g status-left "#[bg=#6b9e78,fg=#0e0d0a,bold] #S #[bg=#0e0d0a] "

# Right: pane info, date, time — amber accent for clock
set -g status-right-length 60
set -g status-right "#[fg=#665f56]Pane #(expr #{pane_index} + 1)/#{window_panes} #[fg=#4a443c]| #[fg=#665f56]#(TZ='America/New_York' date +'%%b %%d') #[bg=#c9a84c,fg=#0e0d0a,bold] #(TZ='America/New_York' date +'%%I:%%M %%p') "

# Window list styling
set -g window-status-format "#[fg=#665f56] #I:#W "
set -g window-status-current-format "#[bg=#13120e,fg=#ddd7cd,bold] #I:#W "
set -g window-status-separator ""

# Pane borders (single lines required for arrow indicators to work)
set -g pane-border-style "fg=#332e28"
set -g pane-active-border-style "fg=#6b9e78,bold"
set -g pane-border-lines single
set -g pane-border-indicators both

# Pane border labels — active pane gets green tag, inactive fades out
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bg=#6b9e78#,fg=#0e0d0a#,bold] ▸ #{pane_current_command} #[default],#[fg=#4a443c] #{pane_current_command} }"

# Message styling
set -g message-style "bg=#13120e,fg=#ddd7cd"
